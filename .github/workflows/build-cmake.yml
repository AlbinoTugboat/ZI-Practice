name: build-cmake

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - feature/**
  pull_request:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Configure (CMake)
        run: cmake --preset vs2022-x64

      - name: Build Debug (CMake)
        run: cmake --build --preset build-debug
