name: build-cmake

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
      - feature/**
  pull_request:

jobs:
  windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Configure (CMake)
        run: cmake --preset vs2022-x64

      - name: Build Debug (CMake)
        run: cmake --build --preset build-debug

      - name: Verify expected binaries
        shell: pwsh
        run: |
          $debugDir = "out/build/vs2022-x64/Debug"
          if (-not (Test-Path "$debugDir/ZIVPO.exe")) { throw "Missing ZIVPO.exe" }
          if (-not (Test-Path "$debugDir/ZIVPO.Service.exe")) { throw "Missing ZIVPO.Service.exe" }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zivpo-debug-vs2022-x64
          path: |
            out/build/vs2022-x64/Debug/ZIVPO.exe
            out/build/vs2022-x64/Debug/ZIVPO.Service.exe
            out/build/vs2022-x64/Debug/Microsoft.WindowsAppRuntime.Bootstrap.dll
